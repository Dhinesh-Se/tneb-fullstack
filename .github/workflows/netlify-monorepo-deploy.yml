name: Deploy backend + frontend to Netlify

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_api_url: ${{ steps.deploy.outputs.backend_api_url }}
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_BACKEND_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Netlify CLI
        run: npm i -g netlify-cli@latest

      - name: Deploy backend
        id: deploy
        working-directory: backend
        run: |
          netlify deploy --build --prod --json > deploy-output.json
          SITE_URL=$(node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('deploy-output.json','utf8'));console.log(d.url || d.deploy_url || '')")
          API_URL="${SITE_URL}/.netlify/functions/api"
          echo "backend_api_url=$API_URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_FRONTEND_SITE_ID }}
      REACT_APP_API_URL: ${{ needs.deploy-backend.outputs.backend_api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Netlify CLI
        run: npm i -g netlify-cli@latest

      - name: Build frontend with backend API URL
        working-directory: frontend
        run: |
          echo "REACT_APP_API_URL=$REACT_APP_API_URL" > .env.production
          npm install
          npm run build

      - name: Deploy frontend
        working-directory: frontend
        run: netlify deploy --dir=build --prod --json
