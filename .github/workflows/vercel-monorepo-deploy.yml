name: Deploy backend + frontend to Vercel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.backend_url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      FRONTEND_FALLBACK_URL: https://tneb-fullstack-nyfs.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull backend Vercel project settings
        working-directory: backend
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy backend
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          CLEAN_URL=$(echo "$URL" | tail -n 1 | tr -d '\r')
          echo "backend_url=https://${CLEAN_URL#https://}" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      REACT_APP_API_URL: ${{ needs.deploy-backend.outputs.backend_url || 'https://tneb-fullstack.vercel.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull frontend Vercel project settings
        run: vercel pull --cwd frontend --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy frontend with backend URL
        working-directory: frontend
        run: |
          API_URL="${REACT_APP_API_URL:-https://tneb-fullstack.vercel.app}"
          echo "Using API URL: $API_URL"
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" --build-env REACT_APP_API_URL="$API_URL"
