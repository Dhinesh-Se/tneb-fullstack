name: Deploy backend + frontend to Vercel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.backend_url }}
    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || { echo "::error::Missing VERCEL_TOKEN secret"; exit 1; }
          [ -n "${{ secrets.VERCEL_ORG_ID }}" ] || { echo "::error::Missing VERCEL_ORG_ID secret"; exit 1; }
          [ -n "${{ secrets.VERCEL_BACKEND_PROJECT_ID }}" ] || { echo "::error::Missing VERCEL_BACKEND_PROJECT_ID secret"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull backend Vercel project settings
        working-directory: backend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build backend
        working-directory: backend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy backend
        id: deploy
        working-directory: backend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "backend_url=$URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || { echo "::error::Missing VERCEL_TOKEN secret"; exit 1; }
          [ -n "${{ secrets.VERCEL_ORG_ID }}" ] || { echo "::error::Missing VERCEL_ORG_ID secret"; exit 1; }
          [ -n "${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}" ] || { echo "::error::Missing VERCEL_FRONTEND_PROJECT_ID secret"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull frontend Vercel project settings
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build frontend with backend URL
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          REACT_APP_API_URL: ${{ needs.deploy-backend.outputs.backend_url }}
        run: |
          echo "REACT_APP_API_URL=$REACT_APP_API_URL" > .env.production
          vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy frontend
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
